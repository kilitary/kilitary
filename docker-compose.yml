# Laravel stack: PHP-FPM, Nginx, MySQL 8, Redis.
# First run: cp .env.docker.example .env.docker  (optional template for secrets / APP_KEY)
# App env: docker/defaults.env is merged with .env (.env wins on duplicate keys in Compose v2+).
#
# Core: docker compose up -d
# Queue worker: docker compose --profile queue up -d
# Scheduler: docker compose --profile scheduler up -d
# Frontend watch: docker compose --profile assets up -d

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kiltary
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: docker/defaults.env
      - path: .env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kilitary

  nginx:
    image: nginx:1.25-alpine
    container_name: kilitary-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-82}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - kilitary

  mysql:
    image: mysql:8.0
    container_name: kilitary-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-33060}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kilitary}
      MYSQL_USER: ${DB_USERNAME:-kilitary}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kilitary_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s
    networks:
      - kilitary

  redis:
    image: redis:7-alpine
    container_name: kilitary-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-63790}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - kilitary

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kilitary-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: docker/defaults.env
      - path: .env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    profiles:
      - queue
    networks:
      - kilitary

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kilitary-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: docker/defaults.env
      - path: .env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    profiles:
      - scheduler
    networks:
      - kilitary

  node:
    image: node:18-bookworm-slim
    container_name: kilitary-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: ["sh", "-c", "npm ci && npm run watch"]
    profiles:
      - assets
    networks:
      - kilitary

networks:
  kilitary:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
